layer: 'tool'

project:
  name: 'mcp-server'
  description: 'MCP server for MaverickAI'

tags:
  - 'mcp'
  - 'server'
  - 'python'

tasks:
  # Run the MCP server for Antigravity to connect to
  run:
    command: 'python main.py'
    env:
      PYTHONPATH: './src'
  
  # Update the RAG database from YouTube transcripts and Web
  sync-knowledge:
    command: 'python scripts/update_rag.py'
    inputs:
      - 'knowledge_sources.json'
  
  # Type checking for the Python bridge
  typecheck:
    command: 'mypy .'