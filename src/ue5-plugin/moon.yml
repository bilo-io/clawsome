layer: 'application'

project:
  name: 'ue5-plugin'
  description: 'UE5 plugin for MaverickAI'

tags:
  - 'ue5'
  - 'plugin'
  - 'cpp'

tasks:
  # Generate project files for the IDE
  generate:
    command: 'UnrealBuildTool -ProjectFiles -Project="@project(maverick).uproject"'
  
  # Compile the plugin in Development Editor mode
  build:
    command: 'UnrealBuildTool Win64 Development -Project="@project(maverick).uproject" -Target="Editor"'
    inputs:
      - 'Source/**/*'
      - 'Resources/**/*'
    outputs:
      - 'Binaries/Win64/*.dll'

  # Clean build artifacts
  clean:
    command: 'rm -rf Binaries/ Intermediate/'