# apps/dashboard/moon.yml
$schema: 'https://moonrepo.dev/schemas/project.json'
type: 'application'
stack: 'frontend'

project:
  name: 'ClawSome Dashboard'
  description: 'ClawSome Dashboard to manage your AI swarm'
dependsOn:
  - 'core'
  - 'ui'


tasks:
  dev:
    command: 'next dev'
  build:
    command: 'next build'
    inputs:
      - 'src/**/*'
      - 'public/**/*'
