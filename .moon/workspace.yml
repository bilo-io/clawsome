# .moon/workspace.yml
$schema: 'https://moonrepo.dev/schemas/workspace.json'

projects:
  - 'src/apps/*'
  - 'src/apis/*'
  - 'src/shared/*'
  - 'src/mcp-server'
  - 'src/ue5-plugin'
  - 'skills/*'

vcs:
  # 'manager' is removed. Use 'client' if you want to force 'git', 
  # but moon usually auto-detects this.
  client: 'git'
  defaultBranch: 'master'
  provider: 'github'