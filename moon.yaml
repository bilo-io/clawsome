# moon.yaml
$schema: 'https://moonrepo.dev/schemas/project.json'

project:
  name: 'antigravity-template'
  type: 'library'

tasks:
  # Validates Antigravity skill metadata
  validate:
    command: 'ag-cli validate ./skills'
    inputs:
      - 'skills/**/*'

  # Compiles TS skills - updated to include src/shared if skills depend on them
  build:
    command: 'tsc --build'
    inputs:
      - 'skills/**/*'
      - 'src/shared/**/*'
      - 'tsconfig.json'
    outputs:
      - 'dist'

  # Updated to reflect your actual src/ directory structure
  sync-agents:
    command: 'node ./scripts/sync-agents.mjs'
    inputs:
      - 'src/apps/**/*'
      - 'src/apis/**/*'
      - 'src/shared/**/*'
      - 'agents/**/*'
      - 'moon.yaml'
    outputs:
      - 'AGENTS.md'
    options:
      runInCI: true

  # New: A helper task to audit your fullstack code using Gemini CLI
  audit:
    command: 'gemini "Analyze @src for dependency leaks between apps and apis"'
    inputs:
      - 'src/**/*'